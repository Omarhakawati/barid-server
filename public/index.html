<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bareed | بريد</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

  :root {
    --bg0: #000510;
    --bg1: #000d28;
    --bg2: #000820;
    --card: rgba(255,255,255,0.055);
    --card-border: rgba(255,255,255,0.11);
    --card-top: rgba(255,255,255,0.18);
    --chip: rgba(255,255,255,0.04);
    --chip-border: rgba(255,255,255,0.08);
    --sub: rgba(255,255,255,0.07);
    --blue: #3d7dd4;
    --red: #c94444;
    --green: #28956a;
    --amber: #b07a22;
    --live: #e03333;
    --hl: #6699ff;
    --hl-bg: rgba(61,125,212,0.20);
    --t1: rgba(255,255,255,0.92);
    --t2: rgba(255,255,255,0.52);
    --t3: rgba(255,255,255,0.22);
    --t4: rgba(255,255,255,0.18);
    --t5: rgba(255,255,255,0.35);
    --topic1: #3d7dd4;
    --topic2: #c94444;
    --topic3: #28956a;
    --topic4: #b07a22;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    background-color: #000510;
  }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: linear-gradient(160deg, var(--bg0) 0%, var(--bg1) 30%, var(--bg2) 60%, var(--bg0) 100%);
    background-color: var(--bg0);
    min-height: 100vh;
    min-height: 100dvh;
    color: var(--t1);
    direction: rtl;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* ── Layout ── */
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  @media (min-width: 900px) {
    body { background-attachment: fixed; }
    .app {
      max-width: 100%;
      flex-direction: row;
    }
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-left: 1px solid var(--sub);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .main { flex: 1; overflow-y: auto; height: 100vh; }
  }

  /* ── Topbar ── */
  .topbar {
    padding: 14px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(180deg, rgba(0,5,16,0.95) 80%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 700;
    color: var(--t1);
    letter-spacing: -0.3px;
    direction: ltr;
  }

  .logo-icon { width: 28px; height: 32px; }

  .live-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 50px;
    background: rgba(220,40,40,0.12);
    border: 1px solid rgba(220,40,40,0.25);
  }

  .live-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .live-text { font-size: 10px; font-weight: 500; color: var(--live); letter-spacing: 0.06em; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Stories ── */
  .stories-wrap {
    padding: 8px 0 12px;
    border-bottom: 0.5px solid var(--sub);
  }

  .stories {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding: 4px 20px;
    scrollbar-width: none;
  }
  .stories::-webkit-scrollbar { display: none; }

  .story {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    flex-shrink: 0;
    background: none;
    border: none;
    color: inherit;
  }

  .story-ring {
    width: 56px; height: 56px;
    border-radius: 50%;
    padding: 2.5px;
    background: linear-gradient(135deg, rgba(61,125,212,0.35), rgba(100,180,255,0.2));
    transition: transform 0.15s;
  }

  .story-ring.active {
    background: linear-gradient(135deg, #3d7dd4, #66bbff);
  }

  .story:hover .story-ring { transform: scale(1.05); }

  .story-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #080f22;
    border: 2px solid #080f22;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--t1);
    overflow: hidden;
    position: relative;
  }
  .story-inner img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .story-name {
    font-size: 10px;
    color: var(--t5);
    text-align: center;
    max-width: 62px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .story.active .story-name { color: var(--t1); font-weight: 500; }

  .story-count {
    font-size: 9px;
    color: var(--t4);
    font-variant-numeric: tabular-nums;
  }

  .story.active .story-count { color: rgba(61,125,212,0.8); }

  /* ── New content badge ── */
  .story-ring { position: relative; }
  .new-badge {
    position: absolute;
    top: -3px; left: -3px;
    min-width: 16px; height: 16px;
    border-radius: 8px;
    background: #e03333;
    border: 2px solid #000d28;
    display: none;
    z-index: 2;
    animation: badge-pop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    font-size: 8px;
    font-weight: 700;
    color: white;
    align-items: center;
    justify-content: center;
    padding: 0 3px;
    font-family: inherit;
  }
  .new-badge.show { display: flex; }
  @keyframes badge-pop {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* Sidebar badge */
  .sidebar-avatar { position: relative; }
  .sidebar-new-badge {
    position: absolute;
    top: -2px; left: -2px;
    min-width: 14px; height: 14px;
    border-radius: 7px;
    background: #e03333;
    border: 2px solid #000d28;
    display: none;
    z-index: 2;
    animation: badge-pop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    font-size: 7px;
    font-weight: 700;
    color: white;
    align-items: center;
    justify-content: center;
    padding: 0 2px;
    font-family: inherit;
  }
  .sidebar-new-badge.show { display: flex; }

  /* ── Summary tab ── */
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 11px;
    border-radius: 50px;
    background: linear-gradient(135deg, rgba(61,125,212,0.12), rgba(120,70,240,0.12));
    border: 1px solid rgba(110,150,255,0.22);
    font-size: 10px;
    font-weight: 500;
    color: rgba(150,185,255,0.85);
    letter-spacing: 0.05em;
  }

  .summary-hero {
    font-size: 14px;
    line-height: 1.85;
    color: rgba(255,255,255,0.88);
    text-align: right;
    letter-spacing: 0.01em;
    white-space: pre-line;
  }

  .analysis-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .analysis-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--hl);
    text-align: right;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(102,153,255,0.15);
  }
  .analysis-section-body {
    font-size: 13px;
    line-height: 1.85;
    color: rgba(255,255,255,0.82);
    text-align: right;
    white-space: pre-line;
  }
  .analysis-compression {
    background: rgba(61,125,212,0.08);
    border: 1px solid rgba(61,125,212,0.2);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.8;
    color: rgba(255,255,255,0.9);
    text-align: right;
    font-weight: 500;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat-grid.three { grid-template-columns: 1fr 1fr 1fr; }

  .stat-card {
    border-radius: 16px;
    padding: 14px 12px 12px;
    text-align: center;
    background: var(--chip);
    border: 1px solid var(--chip-border);
    border-top: 1px solid rgba(255,255,255,0.13);
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--glow, rgba(61,125,212,0.08)), transparent 70%);
    pointer-events: none;
  }

  .stat-num {
    font-size: 36px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 5px;
  }
  .stat-grid.three .stat-num { font-size: 26px; }

  .stat-lbl {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--t3);
  }
  .stat-sub {
    font-size: 9px;
    color: var(--t4);
    margin-top: 3px;
  }

  .topic-bars { display: flex; flex-direction: column; gap: 9px; }
  .topic-bar-row2 { display: flex; flex-direction: column; gap: 5px; }
  .topic-bar-meta { display: flex; justify-content: space-between; align-items: baseline; }
  .topic-bar-name { font-size: 12px; color: var(--t2); text-align: right; }
  .topic-bar-pct  { font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .topic-track { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.06); overflow: hidden; }
  .topic-fill  { height: 100%; border-radius: 2px; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    padding: 0 20px;
    border-bottom: 0.5px solid var(--sub);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 14px;
    cursor: pointer;
    position: relative;
    color: var(--t4);
    background: none;
    border: none;
    font-family: inherit;
    color: inherit;
    transition: color 0.15s;
  }

  .tab.active { color: var(--t1); font-weight: 600; }

  .tab-line {
    position: absolute;
    bottom: 0; left: 12px; right: 12px;
    height: 2px;
    border-radius: 1px;
    background: var(--blue);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .tab.active .tab-line { opacity: 1; }

  /* ── Cards ── */
  .cards-area {
    flex: 1;
    overflow-y: auto;
    padding: 14px 20px calc(80px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-top: 1px solid var(--card-top);
    border-radius: 20px;
    overflow: hidden;
  }

  .card-hdr {
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--sub);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: rgba(255,255,255,0.015);
  }

  .card-lbl {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--t3);
    margin-bottom: 2px;
  }

  .card-ch { font-size: 15px; font-weight: 500; color: var(--t1); }
  .card-time { font-size: 10px; color: var(--t4); padding-top: 4px; }

  .card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

  /* chips */
  .chips { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .chip {
    background: var(--chip);
    border: 1px solid var(--chip-border);
    border-top: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 11px 13px;
    text-align: right;
  }

  .chip-lbl { font-size: 8px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); margin-bottom: 3px; }
  .chip-val { font-size: 24px; font-weight: 500; color: var(--t1); line-height: 1; font-variant-numeric: tabular-nums; }
  .chip-sub { font-size: 9px; color: var(--t3); margin-top: 2px; }

  /* direction pill */
  .dir-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 500;
  }

  .dir-dot { width: 5px; height: 5px; border-radius: 50%; }
  .sep { height: 0.5px; background: var(--sub); }
  .slbl { font-size: 9px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--t3); text-align: right; }

  /* donut */
  .donut-row { display: flex; align-items: center; gap: 12px; flex-direction: row-reverse; }
  .donut-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
  .donut-wrap svg { width: 90px; height: 90px; }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 500; color: var(--t3);
    text-align: center; line-height: 1.4;
  }

  .legend { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .leg-item { display: flex; align-items: center; gap: 6px; direction: rtl; }
  .leg-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .leg-name { font-size: 11px; flex: 1; text-align: right; color: var(--t2); }
  .leg-pct { font-size: 10px; font-weight: 500; color: var(--t3); font-variant-numeric: tabular-nums; }

  /* words */
  .words { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .word-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 50px;
    background: var(--chip); border: 1px solid var(--chip-border);
    font-size: 11px; color: var(--t2);
  }
  .word-count { font-size: 9px; font-weight: 500; color: var(--t3); }

  /* summary */
  .summary { font-size: 12px; color: var(--t2); line-height: 1.7; text-align: right; }
  .hl { background: var(--hl-bg); color: var(--hl); padding: 1px 4px; border-radius: 3px; font-weight: 500; }

  /* story row */
  .story-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 0; text-decoration: none; color: inherit;
    cursor: pointer;
  }

  .story-bar { width: 3px; height: 48px; border-radius: 2px; flex-shrink: 0; }
  .story-content { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .story-title { font-size: 14px; font-weight: 600; color: var(--t1); line-height: 1.5; text-align: right; }
  .story-desc { font-size: 12px; color: var(--t2); line-height: 1.5; text-align: right; }
  .story-meta { display: flex; gap: 8px; font-size: 10px; color: var(--t3); justify-content: flex-end; }

  /* skeleton */
  .skeleton { animation: shimmer 1.2s ease-in-out infinite alternate; }
  @keyframes shimmer { from{opacity:0.4} to{opacity:0.8} }
  .skel-bar { background: rgba(255,255,255,0.08); border-radius: 6px; }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: min(480px, 100%);
    padding: 0 40px calc(24px + env(safe-area-inset-bottom));
    z-index: 20;
  }

  @media (min-width: 900px) {
    .bottom-nav { display: none; }
  }

  .nav-inner {
    background: rgba(10,18,40,0.92);
    border: 1px solid var(--card-border);
    border-top: 1px solid var(--card-top);
    border-radius: 50px;
    display: flex;
    align-items: center;
    padding: 8px 20px;
    backdrop-filter: blur(12px);
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    background: none;
    border: none;
    color: var(--t3);
    font-family: inherit;
  }

  .nav-item.active { color: var(--blue); }
  .nav-item svg { width: 20px; height: 20px; }

  .nav-lbl { font-size: 9px; font-weight: 500; }

  .nav-center {
    background: rgba(61,125,212,0.15);
    border: 1px solid rgba(61,125,212,0.3);
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2px;
  }

  .nav-active-bg {
    background: rgba(61,125,212,0.10);
    border-radius: 20px;
    padding: 4px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  /* ── Sidebar (desktop) ── */
  .sidebar {
    display: none;
  }

  @media (min-width: 900px) {
    .sidebar {
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
    }
    .sidebar .logo { margin-bottom: 4px; }
    .sidebar-channels {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sidebar-ch {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
      font-family: inherit;
      transition: background 0.15s;
      text-align: right;
      width: 100%;
    }
    .sidebar-ch:hover { background: rgba(255,255,255,0.04); }
    .sidebar-ch.active { background: rgba(61,125,212,0.12); }
    .sidebar-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #080f22;
      border: 1.5px solid rgba(61,125,212,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-avatar img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .sidebar-ch.active .sidebar-avatar {
      border-color: var(--blue);
    }
    .sidebar-info { flex: 1; }
    .sidebar-name { font-size: 13px; font-weight: 500; color: var(--t1); text-align: right; }
    .sidebar-count { font-size: 11px; color: var(--t3); text-align: right; }
    .sidebar-ch.active .sidebar-count { color: var(--blue); }
  }

  /* loading state */
  .loading-card {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 16px;
  }

  /* error */
  .error-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 32px 16px;
    text-align: center;
  }

  .retry-btn {
    background: rgba(61,125,212,0.12);
    border: 1px solid rgba(61,125,212,0.25);
    color: var(--blue);
    border-radius: 50px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .empty { padding: 32px; text-align: center; color: var(--t3); font-size: 14px; }

  /* ── Responsive fixes ── */

  /* Tablet (600–899px): wider padding, no sidebar */
  @media (min-width: 600px) and (max-width: 899px) {
    .app { max-width: 100%; }
    .topbar { padding: 16px 32px 14px; }
    .stories { padding: 4px 32px; }
    .tabs { padding: 0 32px; }
    .cards-area { padding: 16px 32px 100px; }
    .chip-val { font-size: 28px; }
  }

  /* Desktop (900px+): hide mobile-only elements, fix layout */
  @media (min-width: 900px) {
    #topbar-mobile { display: none; }
    #stories-wrap-mobile { display: none; }
    .tabs { padding: 0 28px; border-top: 0.5px solid var(--sub); }
    .cards-area { padding: 20px 28px 32px; }
    .chip-val { font-size: 28px; }
  }

  /* Wide screens (1200px+): cap content width so cards don't stretch */
  @media (min-width: 1200px) {
    .sidebar { width: 300px; }
    .cards-area {
      max-width: 720px;
      padding-left: 40px;
      padding-right: 40px;
    }
    .tabs { max-width: 720px; }
    .chip-val { font-size: 32px; }
  }

  /* Small phones (≤ 360px) */
  @media (max-width: 360px) {
    .topbar { padding: 12px 14px 10px; }
    .logo-text { font-size: 18px; }
    .stories { padding: 4px 14px; gap: 10px; }
    .story-ring { width: 48px; height: 48px; }
    .tabs { padding: 0 14px; }
    .cards-area { padding: 12px 14px 80px; }
    .chip-val { font-size: 20px; }
    .card-body { padding: 12px; gap: 10px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- Sidebar (desktop) -->
  <aside class="sidebar" id="sidebar">
    <div>
      <div class="logo">

<script>
const BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3000'
  : 'https://barid-server.onrender.com';
const TOPIC_COLORS = ['#3d7dd4','#c94444','#28956a','#b07a22','#7a4db0','#b04d4d'];
const CH_COLORS = {
  ajabreaking:'#be1919', bbc:'#b40000', cnn:'#b90a0a',
  sky:'#005faf', france24:'#004191', dw:'#0069af', rtarabic:'#8c0000', alarabiya:'#006633'
};

// Special aggregate channel (always first)
const BARID_CH = { id: 'barid', nameAr: 'بريد', label: 'بريد', xHandle: null };
// Inline SVG logo for barid circle (small version)
const BARID_LOGO_SVG = `<svg viewBox="0 0 64 64" fill="none" style="width:65%;height:65%">
  <path d="M38 22 L46 27 L46 48 L38 45 Z" fill="#8a1525"/>
  <path d="M10 22 L38 22 L38 45 L10 45 Z" fill="#c8243c"/>
  <path d="M10 22 Q10 12 24 12 Q38 12 38 22" fill="#a81c30"/>
  <path d="M38 22 Q38 12 43 16 L46 27 Q42 22 38 22" fill="#6a0f1c"/>
  <rect x="15" y="29" width="16" height="3" rx="1.5" fill="#6a0f1c"/>
  <circle cx="43" cy="10" r="6" fill="#000d28"/>
  <circle cx="43" cy="10" r="4.5" fill="#3d7dd4"/>
  <circle cx="43" cy="10" r="2" fill="white" opacity="0.9"/>
</svg>`;

let channels = [];
let channelData = {};
let activeChannel = '';
let activeTab = 'today';
let pollTimer = null;
let lastCounts = {}; // track previous counts per channel to detect new content
let newCounts  = {}; // accumulate new items since badge was shown

// ── Boot ──
async function boot() {
  try {
    const res = await fetch(`${BASE}/api/channels`);
    const json = await res.json();
    channels = [BARID_CH, ...(json.channels || [])];
    renderStories();
    renderSidebar();
    if (channels.length) selectChannel(channels[0].id);
  } catch(e) {
    document.getElementById('cards-area').innerHTML = `
      <div class="card"><div class="error-card">
        <svg width="32" height="32" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 6s4-6 11-6 11 6 11 6-4 6-11 6-11-6-11-6"/><circle cx="12" cy="6" r="3"/></svg>
        <div style="font-size:15px;font-weight:600;color:rgba(255,255,255,0.88)">تعذّر الاتصال</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.4)">تأكد أن السيرفر يعمل على localhost:3000</div>
        <button class="retry-btn" onclick="boot()">إعادة المحاولة</button>
      </div></div>`;
  }
}

// ── Avatar helper ──
function avatarInner(ch) {
  if (ch.id === 'barid') {
    return BARID_LOGO_SVG;
  }
  if (ch.xHandle) {
    const letter = ch.nameAr.charAt(0);
    return `<img src="https://unavatar.io/twitter/${ch.xHandle}" alt="${letter}" onerror="this.style.display='none'">
            <span style="position:absolute">${letter}</span>`;
  }
  return ch.nameAr.charAt(0);
}

function sidebarAvatarInner(ch) {
  if (ch.id === 'barid') {
    return BARID_LOGO_SVG;
  }
  if (ch.xHandle) {
    const letter = ch.nameAr.charAt(0);
    return `<img src="https://unavatar.io/twitter/${ch.xHandle}" alt="${letter}" onerror="this.style.display='none'">
            <span style="position:absolute;z-index:0">${letter}</span>`;
  }
  return ch.nameAr.charAt(0);
}

// ── Stories ──
function renderStories() {
  const rail = document.getElementById('stories-rail');
  rail.innerHTML = channels.map(ch => `
    <button class="story ${ch.id === activeChannel ? 'active' : ''}" id="story-${ch.id}" onclick="selectChannel('${ch.id}')">
      <div class="story-ring ${ch.id === activeChannel ? 'active' : ''}">
        <div class="new-badge" id="badge-${ch.id}"></div>
        <div class="story-inner" style="background:${ch.id==='barid'?'#000d28':CH_COLORS[ch.id]||'#080f22'}">
          ${avatarInner(ch)}
        </div>
      </div>
      <span class="story-name">${ch.nameAr}</span>
      <span class="story-count" id="count-${ch.id}">—</span>
    </button>
  `).join('');
}

// ── Sidebar ──
function renderSidebar() {
  const el = document.getElementById('sidebar-channels');
  el.innerHTML = channels.map(ch => `
    <button class="sidebar-ch ${ch.id === activeChannel ? 'active' : ''}" id="sch-${ch.id}" onclick="selectChannel('${ch.id}')">
      <div class="sidebar-avatar" style="background:${ch.id==='barid'?'#000d28':CH_COLORS[ch.id]||'#080f22'}">
        <div class="sidebar-new-badge" id="sbadge-${ch.id}"></div>
        ${sidebarAvatarInner(ch)}
      </div>
      <div class="sidebar-info">
        <div class="sidebar-name">${ch.nameAr}</div>
        <div class="sidebar-count" id="scount-${ch.id}">جاري التحميل...</div>
      </div>
    </button>
  `).join('');
}

// ── Select Channel ──
function selectChannel(id) {
  activeChannel = id;
  document.querySelectorAll('.story').forEach(s => {
    s.classList.toggle('active', s.id === `story-${id}`);
    s.querySelector('.story-ring').classList.toggle('active', s.id === `story-${id}`);
  });
  document.querySelectorAll('.sidebar-ch').forEach(s => {
    s.classList.toggle('active', s.id === `sch-${id}`);
  });

  // Clear new-content badge when opening this channel
  newCounts[id] = 0;
  const badge  = document.getElementById(`badge-${id}`);
  const sbadge = document.getElementById(`sbadge-${id}`);
  if (badge)  badge.classList.remove('show');
  if (sbadge) sbadge.classList.remove('show');

  // Stop previous poll
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

  // Show cached data immediately if available, else skeleton
  if (channelData[id]) renderCard(channelData[id]);
  else showSkeleton();

  // Fetch + start polling every 2 minutes
  async function fetchChannel(chId) {
    try {
      const url  = chId === 'barid' ? `${BASE}/api/aggregate` : `${BASE}/api/channel/${chId}`;
      const res  = await fetch(url);
      const data = await res.json();
      const total = chId === 'barid'
        ? (data.totalToday || 0)
        : ((data.sources?.rss||0) + (data.sources?.twitter||0) || data.totalToday || 0);
      const prev  = lastCounts[chId];
      if (prev !== undefined && total > prev && activeChannel !== chId) {
        newCounts[chId] = (newCounts[chId] || 0) + (total - prev);
        const label = newCounts[chId] > 9 ? '9+' : String(newCounts[chId]);
        const b  = document.getElementById(`badge-${chId}`);
        const sb = document.getElementById(`sbadge-${chId}`);
        if (b)  { b.textContent = label;  b.classList.remove('show'); void b.offsetWidth; b.classList.add('show'); }
        if (sb) { sb.textContent = label; sb.classList.remove('show'); void sb.offsetWidth; sb.classList.add('show'); }
      }
      lastCounts[chId] = total;
      channelData[chId] = data;
      const c  = document.getElementById(`count-${chId}`);
      const sc = document.getElementById(`scount-${chId}`);
      if (c)  c.textContent  = total || '—';
      if (sc) sc.textContent = chId === 'barid' ? `${total} خبر إجمالي` : `${total} خبر اليوم`;
      if (activeChannel === chId) renderCard(data);
    } catch(e) {
      if (activeChannel === chId && !channelData[chId]) renderError(chId);
    }
  }

  fetchChannel(id);
  pollTimer = setInterval(() => fetchChannel(id), 2 * 60 * 1000);
}

// ── Tab ──
function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (channelData[activeChannel]) renderCard(channelData[activeChannel]);
}

// ── Section ──
function switchSection(sec) { }

// ── Skeleton ──
function showSkeleton() {
  document.getElementById('cards-area').innerHTML = `
    <div class="card"><div class="loading-card">
      <div class="chips">
        <div class="chip skel-bar skeleton" style="height:80px"></div>
        <div class="chip skel-bar skeleton" style="height:80px"></div>
      </div>
      <div class="skel-bar skeleton" style="height:8px;width:80%;margin-right:auto"></div>
      <div class="skel-bar skeleton" style="height:8px;width:55%;margin-right:auto"></div>
      <div class="skel-bar skeleton" style="height:8px;width:70%;margin-right:auto"></div>
    </div></div>`;
}

// ── Error ──
function renderError(id) {
  document.getElementById('cards-area').innerHTML = `
    <div class="card"><div class="error-card">
      <div style="font-size:15px;font-weight:600;color:rgba(255,255,255,0.88)">تعذّر تحميل القناة</div>
      <button class="retry-btn" onclick="selectChannel('${id}')">إعادة المحاولة</button>
    </div></div>`;
}

// ── Render Card ──
function renderCard(data) {
  if (data.error) { renderError(activeChannel); return; }
  if (!data.totalToday && !data.topics?.length) { renderError(activeChannel); return; }
  // Aggregate channel has its own renderer
  if (activeChannel === 'barid') {
    document.getElementById('cards-area').innerHTML = renderAggregate(data);
    return;
  }
  let html = '';
  if (activeTab === 'today') html = renderToday(data);
  else if (activeTab === 'week') html = renderWeek(data);
  else if (activeTab === 'summary') html = renderSummary(data);
  else html = renderNews(data);
  document.getElementById('cards-area').innerHTML = html;
}

// ── Today ──
function renderToday(d) {
  const dir = d.dirMeta;
  const dirColor = {
    'dir-h':'#c94444','dir-e':'#b07a22','dir-g':'#28956a'
  }[dir?.cls] || '#3d7dd4';

  const topics = (d.topics||[]).slice(0,4);
  const topicColors = TOPIC_COLORS;

  // donut
  let offset = 0;
  const r = 31, circ = 2 * Math.PI * r;
  const segments = topics.map((t,i) => {
    const len = (t.pct/100)*circ;
    const seg = `<circle fill="none" stroke="${topicColors[i]}" stroke-width="9" stroke-linecap="butt"
      cx="40" cy="40" r="${r}"
      stroke-dasharray="${len} ${circ-len}"
      stroke-dashoffset="${-offset}"
      transform="rotate(-90 40 40)"/>`;
    offset += len;
    return seg;
  }).join('');

  const words = (d.topWords||[]).slice(0,3).map(w =>
    `<span class="word-tag"><span>${w.word}</span><span class="word-count">${w.count}</span></span>`
  ).join('');

  const summary = (d.summary||'').replace(/(\d+%?)/g, `<span class="hl">$1</span>`);

  return `<div class="card">
    <div class="card-hdr">
      <div>
        <div class="card-lbl">ملخص</div>
        <div class="card-ch">${d.channel.nameAr}</div>
      </div>
      <div class="card-time">${d.updatedAt ? (Math.round((Date.now()-d.updatedAt)/60000) <= 0 ? 'الآن' : 'منذ '+Math.round((Date.now()-d.updatedAt)/60000)+' د') : ''}</div>
    </div>
    <div class="card-body">
      <div class="chips">
        ${(() => {
          // Use accumulated tracked count; fall back to snapshot on first seed
          const todayCount = (!d.seeding && d.tracked > 0)
            ? d.tracked
            : ((d.sources?.rss||0)+(d.sources?.twitter||0)||d.totalToday||0);
          const seeding = d.seeding || (!d.tracked && d.tracked !== 0);

          // Sub-label: show forecast rate if available, else source breakdown
          let todaySub;
          if (seeding) {
            todaySub = 'جاري المعايرة…';
          } else if (d.rate) {
            todaySub = `${d.rate} خبر/ساعة`;
          } else if ((d.sources?.twitter||0) > 0) {
            todaySub = `${d.sources.rss} مقال + ${d.sources.twitter} تغريدة`;
          } else {
            todaySub = 'منذ بدء التتبع';
          }

          const hasHistory = d.totalWeek > d.totalToday;
          const weekVal    = hasHistory ? d.totalWeek : '—';
          const weekSub    = hasHistory ? 'خبر هذا الأسبوع' : 'يتراكم يومياً';

          return `
          <div class="chip"><div class="chip-lbl">اليوم</div><div class="chip-val">${todayCount}</div><div class="chip-sub">${todaySub}</div></div>
          <div class="chip"><div class="chip-lbl">الأسبوع</div><div class="chip-val">${weekVal}</div><div class="chip-sub">${weekSub}</div></div>`;
        })()}
      </div>
      ${dir ? `<div><span class="dir-pill" style="background:${dirColor}18;border:1px solid ${dirColor}30;color:${dirColor}">
        <span class="dir-dot" style="background:${dirColor}"></span>${dir.ar}
      </span></div>` : ''}
      <div class="sep"></div>
      <div class="slbl">توزيع التغطية</div>
      <div class="donut-row">
        <div class="donut-wrap">
          <svg viewBox="0 0 80 80">
            <circle fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="9" cx="40" cy="40" r="${r}"/>
            ${segments}
          </svg>
          <div class="donut-center">مواضيع<br>التغطية</div>
        </div>
        <div class="legend">
          ${topics.map((t,i) => `
            <div class="leg-item">
              <span class="leg-dot" style="background:${topicColors[i]}"></span>
              <span class="leg-name">${t.nameAr}</span>
              <span class="leg-pct">${t.pct}%</span>
            </div>`).join('')}
        </div>
      </div>
      ${words ? `<div class="sep"></div><div class="slbl">أكثر الكلمات استخداماً</div><div class="words">${words}</div>` : ''}
      ${summary ? `<div class="sep"></div><div class="slbl">السلوك التحريري</div><div class="summary">${summary}</div>` : ''}
    </div>
  </div>`;
}

// ── Week ──
function renderWeek(d) {
  const avg = Math.max(1, Math.floor((d.totalWeek||0)/7));
  const trends = (d.trends||[]).map(t => {
    const color = t.type==='spike'?'#b07a22':t.type==='up'?'#28956a':'#c94444';
    const icon = t.type==='spike'?'⚡':t.type==='up'?'↑':'↓';
    const sign = t.delta > 0 ? '+' : '';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--sub)">
      <span style="font-size:12px;font-weight:600;color:${color}">${icon} ${sign}${t.delta}%</span>
      <span style="font-size:13px;color:var(--t1)">${t.nameAr}</span>
    </div>`;
  }).join('');

  const words = (d.topWords||[]).slice(0,4).map(w =>
    `<span class="word-tag"><span>${w.word}</span><span class="word-count">${w.count}</span></span>`
  ).join('');

  return `<div class="card">
    <div class="card-hdr">
      <div><div class="card-lbl">الأسبوع</div><div class="card-ch">${d.channel.nameAr}</div></div>
      <div class="card-time">7 أيام</div>
    </div>
    <div class="card-body">
      <div class="chips">
        <div class="chip"><div class="chip-lbl">المعدل اليومي</div><div class="chip-val">${avg}</div><div class="chip-sub">خبر/يوم</div></div>
        <div class="chip"><div class="chip-lbl">الإجمالي</div><div class="chip-val">${d.totalWeek||0}</div><div class="chip-sub">خبر</div></div>
      </div>
      ${trends ? `<div class="sep"></div><div class="slbl">تغيرات المواضيع</div>${trends}` : ''}
      ${words ? `<div class="sep"></div><div class="slbl">أكثر الكلمات</div><div class="words">${words}</div>` : ''}
    </div>
  </div>`;
}

// ── News ──
function renderNews(d) {
  const stories = (d.topStories||[]).filter(s => s.source !== 'twitter');
  const barColors = ['#c94444','#3d7dd4','#28956a'];

  const rows = stories.map((s,i) => `
    <a class="story-row" href="${s.link}" target="_blank" rel="noopener" style="border-bottom:0.5px solid var(--sub)">
      <div class="story-bar" style="background:${barColors[i]||'rgba(255,255,255,0.15)'}"></div>
      <div class="story-content">
        <div class="story-title">${s.title}</div>
        ${s.desc ? `<div class="story-desc">${s.desc}</div>` : ''}
        <div class="story-meta"><span>${s.source}</span><span>${s.pubDateFormatted||''}</span></div>
      </div>
    </a>`).join('');

  return `<div class="card">
    <div class="card-hdr">
      <div><div class="card-lbl">أخبار</div><div class="card-ch">${d.channel.nameAr}</div></div>
      <div class="card-time">${stories.length} قصص</div>
    </div>
    <div style="padding:0 16px 8px">
      ${rows || '<div class="empty">لا توجد أخبار</div>'}
    </div>
  </div>`;
}

// ── Summary ──
function renderSummary(d) {
  const raw = d.longSummary || d.summary || '';

  const updatedAgo = d.updatedAt
    ? (Math.round((Date.now() - d.updatedAt) / 60000) <= 0 ? 'الآن' : 'منذ ' + Math.round((Date.now() - d.updatedAt) / 60000) + ' د')
    : '';

  const totalSources = (d.sources?.rss || 0) + (d.sources?.twitter || 0) || d.totalToday || 0;
  const sparkle = `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>`;

  // Section labels map
  const SECTION_LABELS = {
    '1': 'ما الذي يحدث فعلاً؟',
    '2': 'خريطة القوة',
    '3': 'إلى أين يتجه الحدث؟',
    '4': 'كيف يتم تأطير الخبر؟',
    '5': 'ما الذي لم يُقل؟',
    '6': 'الخلاصة الذكية',
    '7': 'تلخيص ذكي',
  };

  // Try to parse structured sections from AI output
  function renderStructured(text) {
    // Split on numbered section headers like "1." or "1. SIGNAL" etc.
    const parts = text.split(/(?=^\d+\.\s)/m).filter(p => p.trim());
    if (parts.length < 3) {
      // Not structured — render as plain paragraph
      return `<div class="summary-hero">${text}</div>`;
    }

    return parts.map(part => {
      const headerMatch = part.match(/^(\d+)\.\s*([^\n]+)\n?([\s\S]*)/);
      if (!headerMatch) return `<div class="summary-hero">${part.trim()}</div>`;

      const num   = headerMatch[1];
      const title = headerMatch[2].replace(/\(.*?\)/g, '').replace(/[A-Z\s]+/g, '').trim()
                    || SECTION_LABELS[num] || headerMatch[2].trim();
      const body  = headerMatch[3].trim()
                    .replace(/^[-•]\s*/gm, '')  // strip list markers
                    .trim();

      const label = SECTION_LABELS[num] || title;

      if (num === '7') {
        return `<div class="analysis-compression">${body}</div>`;
      }

      return `<div class="analysis-section">
        <div class="analysis-section-title">${label}</div>
        <div class="analysis-section-body">${body}</div>
      </div>`;
    }).join('');
  }

  const body = raw
    ? `<div style="padding:16px 18px 22px;display:flex;flex-direction:column;gap:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <span style="font-size:11px;color:var(--t4)">${totalSources} مادة إعلامية · ${updatedAgo}</span>
          <span class="ai-badge">${sparkle} تحليل ذكاء اصطناعي</span>
        </div>
        ${renderStructured(raw)}
      </div>`
    : `<div class="empty">جاري إعداد التحليل…</div>`;

  return `<div class="card">
    <div class="card-hdr">
      <div>
        <div class="card-lbl">تحليل اليوم</div>
        <div class="card-ch">${d.channel.nameAr}</div>
      </div>
    </div>
    ${body}
  </div>`;
}

// ── Aggregate (بريد channel) ──
function renderAggregate(d) {
  const sparkle = `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>`;
  const updatedAgo = d.updatedAt
    ? (Math.round((Date.now() - d.updatedAt) / 60000) <= 0 ? 'الآن' : 'منذ ' + Math.round((Date.now() - d.updatedAt) / 60000) + ' د')
    : '';

  // Per-channel breakdown — circular progress rings
  const maxCount = Math.max(...(d.channelBreakdown || []).map(c => c.totalToday || 0), 1);
  const R = 26, CIRC = 2 * Math.PI * R;
  const chCircles = (d.channelBreakdown || []).map(c => {
    const pct  = c.totalToday / maxCount;
    const dash = pct * CIRC;
    const color = CH_COLORS[c.id] || '#3d7dd4';
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:5px">
      <div style="position:relative;width:64px;height:64px">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"
            cx="32" cy="32" r="${R}"/>
          <circle fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round"
            cx="32" cy="32" r="${R}"
            stroke-dasharray="${dash.toFixed(1)} ${(CIRC - dash).toFixed(1)}"
            transform="rotate(-90 32 32)"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
          font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--t1)">
          ${c.totalToday}
        </div>
      </div>
      <div style="font-size:10px;color:var(--t2);text-align:center;max-width:66px;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.nameAr}</div>
      ${c.topTopic ? `<div style="font-size:9px;color:var(--t4);text-align:center;max-width:66px;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.topTopic}</div>` : ''}
    </div>`;
  }).join('');

  // AI summary sections
  const SECTION_LABELS = {
    '1': 'ما الذي يحدث فعلاً؟', '2': 'خريطة القوة', '3': 'إلى أين يتجه الحدث؟',
    '4': 'كيف يتم تأطير الخبر؟', '5': 'ما الذي لم يُقل؟',
    '6': 'الخلاصة الذكية', '7': 'تلخيص ذكي',
  };
  function renderStructured(text) {
    const parts = text.split(/(?=^\d+\.\s)/m).filter(p => p.trim());
    if (parts.length < 3) return `<div class="summary-hero">${text}</div>`;
    return parts.map(part => {
      const m = part.match(/^(\d+)\.\s*([^\n]+)\n?([\s\S]*)/);
      if (!m) return `<div class="summary-hero">${part.trim()}</div>`;
      const num = m[1];
      const body = m[3].trim().replace(/^[-•]\s*/gm, '').trim();
      const label = SECTION_LABELS[num] || m[2].trim();
      if (num === '7') return `<div class="analysis-compression">${body}</div>`;
      return `<div class="analysis-section"><div class="analysis-section-title">${label}</div><div class="analysis-section-body">${body}</div></div>`;
    }).join('');
  }

  // Fallback: build a brief narrative from channel breakdown
  function aggregateFallback() {
    const top = (d.channelBreakdown || []).slice(0, 3);
    if (!top.length) return 'لا توجد بيانات كافية.';
    const leader = top[0];
    const lines = [];
    lines.push(`رصدت قنوات بريد اليوم ما مجموعه ${d.totalToday || 0} مادة إعلامية موزعة على ${(d.channelBreakdown||[]).length} قناة.`);
    lines.push(`تصدّرت ${leader.nameAr} المشهد بـ${leader.totalToday} خبر${leader.topTopic ? '، مع تركيز واضح على ملف "' + leader.topTopic + '"' : ''}.`);
    if (top[1]) lines.push(`في المرتبة الثانية جاءت ${top[1].nameAr} بـ${top[1].totalToday} خبراً${top[1].topTopic ? ' يتمحور حول "' + top[1].topTopic + '"' : ''}.`);
    if (top[2]) lines.push(`فيما غطّت ${top[2].nameAr} ${top[2].totalToday} خبراً.`);
    const topTopics = (d.topics || []).slice(0, 3).map(t => t.nameAr).join(' و');
    if (topTopics) lines.push(`أبرز المواضيع المشتركة اليوم: ${topTopics}.`);
    return lines.join(' ');
  }

  const summaryHtml = d.longSummary
    ? `<div style="display:flex;flex-direction:column;gap:18px">${renderStructured(d.longSummary)}</div>`
    : `<div class="summary-hero" style="font-size:13px;line-height:1.9">${aggregateFallback()}</div>`;

  return `
  <div class="card">
    <div class="card-hdr">
      <div>
        <div class="card-lbl">جميع القنوات</div>
        <div class="card-ch">بريد — نظرة شاملة</div>
      </div>
      <div class="card-time">${updatedAgo}</div>
    </div>
    <div class="card-body">
      <div class="chips">
        <div class="chip"><div class="chip-lbl">إجمالي اليوم</div><div class="chip-val">${d.totalToday || 0}</div><div class="chip-sub">من جميع القنوات</div></div>
        <div class="chip"><div class="chip-lbl">الأسبوع</div><div class="chip-val">${d.totalWeek || 0}</div><div class="chip-sub">خبر هذا الأسبوع</div></div>
      </div>
      <div class="sep"></div>
      <div class="slbl">نشاط القنوات اليوم</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px 6px">
        ${chCircles}
      </div>
      <div class="sep"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <span style="font-size:11px;color:var(--t4)">${d.totalToday || 0} مادة إعلامية · ${updatedAgo}</span>
        <span class="ai-badge">${sparkle} تحليل ذكاء اصطناعي</span>
      </div>
      ${summaryHtml}
    </div>
  </div>`;
}

boot();
</script>
</body>
</html>
