<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>بريد</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --glass-bg:          rgba(255,255,255,0.12);
  --glass-bg-heavy:    rgba(255,255,255,0.18);
  --glass-bg-light:    rgba(255,255,255,0.07);
  --glass-border:      rgba(255,255,255,0.28);
  --glass-border-sub:  rgba(255,255,255,0.14);
  --glass-specular:    rgba(255,255,255,0.55);
  --text-1:            rgba(255,255,255,0.95);
  --text-2:            rgba(255,255,255,0.65);
  --text-3:            rgba(255,255,255,0.38);
  --blue:              rgba(100,180,255,0.9);
  --green:             rgba(80,220,140,0.9);
  --amber:             rgba(255,195,80,0.9);
  --red:               rgba(255,105,105,0.9);
  --blur:              40px;
  --font-ar:  "SF Arabic","Geeza Pro",-apple-system,system-ui,"Helvetica Neue",Arial,sans-serif;
  --font-ui:  -apple-system,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
  --r-card:   22px;
  --r-pill:   50px;
  --r-sm:     12px;
}
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
html, body { height: 100%; overflow: hidden; font-family: var(--font-ar); }
body { background: #000; color: var(--text-1); max-width: 430px; margin: 0 auto; }

/* Background */
.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: linear-gradient(160deg,#0a0a1a,#0d1525 40%,#0a1a10); }
.blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: .55; animation: drift linear infinite; }
.b1 { width:380px;height:380px;background:radial-gradient(circle,#1a3a8a,transparent 70%);top:-80px;right:-80px;animation-duration:18s }
.b2 { width:340px;height:340px;background:radial-gradient(circle,#0d5a3a,transparent 70%);bottom:100px;left:-60px;animation-duration:22s;animation-delay:-8s }
.b3 { width:260px;height:260px;background:radial-gradient(circle,#4a1a6a,transparent 70%);top:40%;right:10%;animation-duration:16s;animation-delay:-4s }
.b4 { width:200px;height:200px;background:radial-gradient(circle,#8a4a00,transparent 70%);top:55%;left:15%;animation-duration:20s;animation-delay:-12s;opacity:.35 }
@keyframes drift { 0%{transform:translate(0,0) scale(1)} 25%{transform:translate(30px,-40px) scale(1.05)} 50%{transform:translate(-20px,30px) scale(.95)} 75%{transform:translate(40px,20px) scale(1.03)} 100%{transform:translate(0,0) scale(1)} }

/* App shell */
.app { position: fixed; inset: 0; max-width: 430px; margin: 0 auto; display: flex; flex-direction: column; z-index: 10; overflow: hidden; }

/* Onboarding */
#onboarding { position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;transition:opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.4,0,.2,1); }
#onboarding.exit { opacity:0;transform:scale(.94) translateY(-20px);pointer-events:none }
.logo { font-size:4.5rem;font-weight:700;letter-spacing:-2px;margin-bottom:.3rem;animation:glow 3s ease-in-out infinite alternate }
@keyframes glow { from{text-shadow:0 0 40px rgba(100,180,255,.3)} to{text-shadow:0 0 80px rgba(100,180,255,.6),0 0 120px rgba(100,180,255,.2)} }
.logo-sub { font-size:.82rem;color:var(--text-2);text-align:center;line-height:1.6;margin-bottom:3rem }
.glass-card { width:100%;background:var(--glass-bg);backdrop-filter:blur(28px) saturate(1.8);-webkit-backdrop-filter:blur(28px) saturate(1.8);border:1px solid var(--glass-border);border-radius:var(--r-card);padding:1.5rem;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.25),inset 0 1px 0 var(--glass-specular) }
.glass-card::before { content:'';position:absolute;top:0;left:12px;right:12px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.8) 50%,transparent) }
.ob-label { font-size:.65rem;color:var(--text-3);font-family:var(--font-ui);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem }
.ob-q { font-size:1.1rem;font-weight:500;line-height:1.5;margin-bottom:1.25rem }
.freq-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px }
.freq-btn { background:var(--glass-bg-light);border:1px solid var(--glass-border-sub);border-radius:var(--r-sm);padding:.75rem .5rem;font-family:var(--font-ar);font-size:.85rem;color:var(--text-2);cursor:pointer;text-align:center;transition:all .2s cubic-bezier(.34,1.56,.64,1) }
.freq-btn.active { background:rgba(100,180,255,.2);border-color:rgba(100,180,255,.5);color:var(--blue);transform:scale(1.02) }
.freq-btn.wide { grid-column:span 2 }
.confirm-btn { margin-top:1rem;width:100%;background:rgba(100,180,255,.18);border:1px solid rgba(100,180,255,.4);border-radius:var(--r-pill);padding:.9rem;font-family:var(--font-ar);font-size:1rem;font-weight:600;color:var(--blue);cursor:pointer;display:none;transition:all .2s }
.confirm-btn.show { display:block;animation:fadeUp .35s cubic-bezier(.34,1.56,.64,1) }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px) scale(.96)} to{opacity:1;transform:none} }

/* Status bar */
.status-bar { padding:calc(env(safe-area-inset-top,14px) + 8px) 1.25rem 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0 }
.status-logo { font-size:1.3rem;font-weight:700;letter-spacing:-.5px }
.live-pill { display:flex;align-items:center;gap:5px;background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border-sub);border-radius:var(--r-pill);padding:4px 10px;font-size:.62rem;font-family:var(--font-ui);color:var(--text-2);box-shadow:inset 0 1px 0 rgba(255,255,255,.15) }
.live-dot { width:5px;height:5px;border-radius:50%;background:#50dc8c;box-shadow:0 0 6px #50dc8c;animation:pulse 2s ease-in-out infinite }
.live-dot.loading { background:#ffbe4a;box-shadow:0 0 6px #ffbe4a }
.live-dot.error   { background:#ff6969;box-shadow:0 0 6px #ff6969;animation:none }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Channel rail */
.ch-rail { padding:1rem 1.25rem .75rem;overflow-x:auto;scrollbar-width:none;display:flex;gap:10px;align-items:flex-start;flex-shrink:0 }
.ch-rail::-webkit-scrollbar { display:none }
.ch-item { flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1) }
.ch-item:active { transform:scale(.93) }
.ch-av { width:50px;height:50px;border-radius:50%;background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--glass-border-sub);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;font-family:var(--font-ui);position:relative;transition:all .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 16px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.2) }
.ch-item.active .ch-av { border-color:rgba(100,180,255,.7);background:rgba(100,180,255,.15);box-shadow:0 4px 20px rgba(100,180,255,.25),0 0 0 3px rgba(100,180,255,.12),inset 0 1px 0 rgba(100,180,255,.4);transform:scale(1.08) }
.ch-item:not(.active) .ch-av { opacity:.55 }
.ch-badge { position:absolute;top:0;left:1px;width:12px;height:12px;border-radius:50%;background:var(--amber);border:2px solid rgba(0,0,0,.4);box-shadow:0 0 8px rgba(255,195,80,.6);animation:pulse 2.5s ease-in-out infinite;display:none }
.ch-name { font-size:.6rem;color:var(--text-3) }
.ch-item.active .ch-name { color:var(--text-2) }
.ch-count { font-size:.5rem;font-family:var(--font-ui);color:var(--text-3);font-variant-numeric:tabular-nums;min-height:.8rem }
.ch-add { flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;opacity:.35;cursor:pointer }
.ch-add-circle { width:50px;height:50px;border-radius:50%;border:1.5px dashed rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--text-3) }

/* Tabs */
.tab-bar { display:flex;gap:6px;padding:0 1.25rem .75rem;flex-shrink:0 }
.tab-btn { flex:1;background:var(--glass-bg-light);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border-sub);border-radius:var(--r-pill);padding:7px 0;font-family:var(--font-ar);font-size:.78rem;font-weight:500;color:var(--text-3);cursor:pointer;text-align:center;transition:all .2s cubic-bezier(.34,1.56,.64,1);box-shadow:inset 0 1px 0 rgba(255,255,255,.08) }
.tab-btn.active { background:rgba(100,180,255,.18);border-color:rgba(100,180,255,.45);color:var(--blue);box-shadow:0 0 16px rgba(100,180,255,.1),inset 0 1px 0 rgba(100,180,255,.25) }

/* Scroll */
.scroll { flex:1;overflow-y:auto;overflow-x:hidden;padding:0 1.25rem;scrollbar-width:none;-webkit-overflow-scrolling:touch }
.scroll::-webkit-scrollbar { display:none }
.scroll-end { height:12px }

/* Cards */
.card { background:var(--glass-bg);backdrop-filter:blur(var(--blur)) saturate(2);-webkit-backdrop-filter:blur(var(--blur)) saturate(2);border:1px solid var(--glass-border);border-radius:var(--r-card);overflow:hidden;margin-bottom:14px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.15),inset 0 1px 0 var(--glass-specular);animation:cardIn .45s cubic-bezier(.34,1.56,.64,1) both }
@keyframes cardIn { from{opacity:0;transform:translateY(18px) scale(.96)} to{opacity:1;transform:none} }
.card::before { content:'';position:absolute;top:0;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9) 50%,transparent);z-index:2 }
.card::after { content:'';position:absolute;inset:0;border-radius:var(--r-card);background:linear-gradient(170deg,rgba(255,255,255,.04),transparent 50%);pointer-events:none;z-index:1 }
.card-hd { padding:.9rem 1.1rem .75rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);position:relative;z-index:3 }
.card-type { font-family:var(--font-ui);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3) }
.card-time { font-family:var(--font-ui);font-size:.6rem;color:var(--text-3);font-variant-numeric:tabular-nums }
.card-bd { padding:1rem 1.1rem;position:relative;z-index:3 }

/* Source tag */
.src-tag { display:inline-flex;align-items:center;gap:4px;font-family:var(--font-ui);font-size:.58rem;color:var(--text-3);margin-bottom:.75rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:2px 8px }
.src-tag-dot { width:4px;height:4px;border-radius:50% }

/* Direction pill */
.dir-pill { display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--r-pill);font-size:.72rem;font-weight:600;margin-bottom:1rem;border:1px solid;box-shadow:inset 0 1px 0 rgba(255,255,255,.15) }
.dir-dot { width:6px;height:6px;border-radius:50% }
.dir-h { background:rgba(255,105,105,.12);border-color:rgba(255,105,105,.3);color:var(--red) }
.dir-h .dir-dot { background:var(--red);box-shadow:0 0 6px rgba(255,105,105,.5) }
.dir-p { background:rgba(100,180,255,.12);border-color:rgba(100,180,255,.3);color:var(--blue) }
.dir-p .dir-dot { background:var(--blue);box-shadow:0 0 6px rgba(100,180,255,.5) }
.dir-e { background:rgba(255,195,80,.1);border-color:rgba(255,195,80,.3);color:var(--amber) }
.dir-e .dir-dot { background:var(--amber);box-shadow:0 0 6px rgba(255,195,80,.5) }
.dir-g { background:rgba(80,220,140,.1);border-color:rgba(80,220,140,.3);color:var(--green) }
.dir-g .dir-dot { background:var(--green);box-shadow:0 0 6px rgba(80,220,140,.5) }

/* Stats */
.stat-row { display:flex;gap:8px;margin-bottom:1rem }
.stat-chip { flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-sm);padding:9px 11px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08) }
.stat-l { font-family:var(--font-ui);font-size:.58rem;color:var(--text-3);display:block;margin-bottom:3px;letter-spacing:.05em }
.stat-v { font-family:var(--font-ui);font-size:1.3rem;font-weight:600;display:block;line-height:1;font-variant-numeric:tabular-nums }
.stat-s { font-family:var(--font-ui);font-size:.62rem;color:var(--text-2) }
.up { color:var(--green) }
.dn { color:var(--red) }

/* Bars */
.sec-label { font-family:var(--font-ui);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px }
.t-row { margin-bottom:10px }
.t-head { display:flex;justify-content:space-between;margin-bottom:4px }
.t-name { font-size:.8rem;color:var(--text-2) }
.t-pct { font-family:var(--font-ui);font-size:.75rem;font-weight:600;font-variant-numeric:tabular-nums }
.bar-tr { height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden }
.bar-fi { height:4px;border-radius:2px;transition:width 1s cubic-bezier(.25,.46,.45,.94);position:relative }
.bar-fi::after { content:'';position:absolute;top:0;right:0;bottom:0;width:20px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4)) }

/* AI block */
.ai-bl { margin-top:.875rem;padding-top:.875rem;border-top:1px solid rgba(255,255,255,.08) }
.ai-label { display:flex;align-items:center;gap:5px;font-family:var(--font-ui);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px }
.ai-dot { width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(80,220,140,.7);animation:pulse 3s ease-in-out infinite }
.ai-text { font-size:.82rem;color:var(--text-2);line-height:1.65;font-style:italic }

/* Trends */
.tr-row { display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06) }
.tr-row:last-child { border-bottom:none }
.tr-topic { font-size:.8rem;color:var(--text-2) }
.tr-up { font-family:var(--font-ui);font-size:.72rem;font-weight:600;color:var(--green) }
.tr-dn { font-family:var(--font-ui);font-size:.72rem;font-weight:600;color:var(--red) }
.tr-sp { font-family:var(--font-ui);font-size:.72rem;font-weight:600;color:var(--amber) }

/* Stories */
.story { display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer;transition:all .15s }
.story:last-child { border-bottom:none }
.story:active { opacity:.7;transform:scale(.99) }
.story-hd { font-size:.88rem;font-weight:600;line-height:1.4;margin-bottom:3px }
.story-sub { font-size:.75rem;color:var(--text-2);line-height:1.4 }
.story-src { font-family:var(--font-ui);font-size:.6rem;color:var(--text-3);margin-top:3px;display:flex;align-items:center;gap:4px }
.src-x { color:var(--blue) }
.imp { flex-shrink:0;width:8px;height:8px;border-radius:50%;margin-top:5px }
.imp-h { background:var(--red);box-shadow:0 0 8px rgba(255,105,105,.5) }
.imp-m { background:var(--green);box-shadow:0 0 8px rgba(80,220,140,.4) }
.imp-l { background:rgba(255,255,255,.2) }

/* Skeleton */
.skel { background:rgba(255,255,255,.06);border-radius:6px;position:relative;overflow:hidden }
.skel::after { content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08) 50%,transparent);animation:shimmer 1.6s infinite }
@keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

/* Error */
.err-card { text-align:center;padding:2rem 1rem }
.err-icon { font-size:2rem;margin-bottom:8px;opacity:.4 }
.err-msg { font-size:.85rem;color:var(--text-2);margin-bottom:6px }
.err-sub { font-size:.72rem;color:var(--text-3);font-family:var(--font-ui) }
.retry { margin-top:12px;background:rgba(100,180,255,.15);border:1px solid rgba(100,180,255,.3);border-radius:var(--r-pill);padding:8px 20px;font-family:var(--font-ar);font-size:.82rem;color:var(--blue);cursor:pointer }

/* Nav */
.nav-bar { flex-shrink:0;padding:8px 1rem calc(env(safe-area-inset-bottom,10px) + 8px) }
.nav-in { display:flex;align-items:center;justify-content:space-around;background:var(--glass-bg-heavy);backdrop-filter:blur(var(--blur)) saturate(2);-webkit-backdrop-filter:blur(var(--blur)) saturate(2);border:1px solid var(--glass-border);border-radius:var(--r-pill);padding:10px 8px;box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 var(--glass-specular);position:relative;overflow:hidden }
.nav-in::before { content:'';position:absolute;top:0;left:30px;right:30px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7) 50%,transparent) }
.nav-item { display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.4;transition:all .2s;padding:4px 14px;border-radius:20px }
.nav-item.active { opacity:1;background:rgba(100,180,255,.15);box-shadow:inset 0 1px 0 rgba(100,180,255,.3) }
.nav-icon { font-size:1.1rem }
.nav-lbl { font-family:var(--font-ui);font-size:.55rem;letter-spacing:.03em }
.nav-item.active .nav-lbl { color:var(--blue) }

.ch-view { display:none }
.ch-view.active { display:block }
.sub-card { display:none }
.sub-card.active { display:block }
</style>
</head>
<body>

<div class="bg">
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>
</div>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="logo">بريد</div>
  <p class="logo-sub">صندوقك الذكي للأخبار<br>تحليل حي من RSS و X</p>
  <div class="glass-card">
    <div class="ob-label">أول رسالة تصلك</div>
    <div class="ob-q">كم مرة تريد أن يلخّص بريد وسائل الإعلام لك؟</div>
    <div class="freq-grid">
      <button class="freq-btn" data-v="5">كل ٥ دقائق</button>
      <button class="freq-btn" data-v="15">كل ١٥ دقيقة</button>
      <button class="freq-btn" data-v="30">كل ٣٠ دقيقة</button>
      <button class="freq-btn" data-v="60">كل ساعة</button>
      <button class="freq-btn wide" data-v="major">عند التغييرات الكبرى</button>
    </div>
    <button class="confirm-btn" id="confirmBtn">ابدأ الاستلام ←</button>
  </div>
</div>

<!-- APP -->
<div class="app">
  <div class="status-bar">
    <div class="status-logo">بريد</div>
    <div class="live-pill" id="livePill">
      <div class="live-dot loading" id="liveDot"></div>
      <span id="liveLabel">جارٍ الاتصال</span>
    </div>
  </div>

  <div class="ch-rail" id="chRail"></div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="today">اليوم</button>
    <button class="tab-btn" data-tab="week">الأسبوع</button>
    <button class="tab-btn" data-tab="stories">ما نشروه</button>
  </div>

  <div class="scroll" id="scroll">
    <div id="chViews"></div>
    <div class="scroll-end"></div>
  </div>

  <div class="nav-bar">
    <div class="nav-in">
      <div class="nav-item active"><div class="nav-icon">📬</div><div class="nav-lbl">البريد</div></div>
      <div class="nav-item"><div class="nav-icon">⚖</div><div class="nav-lbl">مقارنة</div></div>
      <div class="nav-item"><div class="nav-icon">📈</div><div class="nav-lbl">الاتجاهات</div></div>
      <div class="nav-item"><div class="nav-icon">⚙</div><div class="nav-lbl">الإعدادات</div></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
// The app talks to the local backend.
// On the same machine: http://localhost:3000
// On a deployed server: change this to your server URL.
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? `http://localhost:3000`
  : window.location.origin; // same origin if deployed together

// ── ARABIC NUMERALS ───────────────────────────────────────────
const toAr = n => String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
const timeAgo = iso => {
  const mins = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (mins < 1)  return 'الآن';
  if (mins < 60) return `${toAr(mins)} د`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${toAr(hrs)} س`;
  return `${toAr(Math.floor(hrs/24))} ي`;
};
const fmtTime = ts => {
  const d = new Date(ts);
  return `${toAr(d.getHours())}:${toAr(String(d.getMinutes()).padStart(2,'0'))}`;
};

// ── STATE ─────────────────────────────────────────────────────
let channels = [];
let activeId = null;
let activeTab = 'today';
let eventSources = {};

// ── SKELETON ──────────────────────────────────────────────────
function skelHtml() {
  return `<div class="card">
    <div class="card-hd">
      <div class="skel" style="width:80px;height:10px"></div>
      <div class="skel" style="width:60px;height:10px"></div>
    </div>
    <div class="card-bd">
      <div class="stat-row">
        <div class="stat-chip"><div class="skel" style="width:100%;height:28px"></div></div>
        <div class="stat-chip"><div class="skel" style="width:100%;height:28px"></div></div>
        <div class="stat-chip"><div class="skel" style="width:100%;height:28px"></div></div>
      </div>
      <div class="skel" style="width:140px;height:26px;border-radius:50px;margin-bottom:1rem"></div>
      <div class="skel" style="width:100%;height:10px;margin-bottom:8px"></div>
      <div class="skel" style="width:80%;height:10px;margin-bottom:8px"></div>
      <div class="skel" style="width:60%;height:10px;margin-bottom:20px"></div>
      <div class="skel" style="width:100%;height:48px"></div>
    </div>
  </div>`;
}

// ── RENDER TODAY ──────────────────────────────────────────────
function renderToday(d) {
  if (d.error) return renderError(d);
  const dir  = d.dirMeta || { ar: 'متنوع', cls: 'dir-g' };
  const topics = (d.topics || []).slice(0, 4);
  const srcLabel = d.xEnabled
    ? `RSS + X (${toAr(d.sources?.twitter||0)} تغريدة)`
    : `RSS فقط`;

  const bars = topics.map(t => `
    <div class="t-row">
      <div class="t-head">
        <span class="t-name">${t.nameAr}</span>
        <span class="t-pct">${toAr(t.pct)}٪</span>
      </div>
      <div class="bar-tr">
        <div class="bar-fi" style="width:${t.pct}%;background:${t.color}"></div>
      </div>
    </div>`).join('');

  const deltaVal = d.totalToday > 0 ? Math.round((d.totalToday / Math.max(d.totalWeek/7, 1) - 1) * 100) : 0;
  const deltaHtml = deltaVal > 0
    ? `<span class="up">↑${toAr(deltaVal)}٪</span>`
    : deltaVal < 0
    ? `<span class="dn">↓${toAr(Math.abs(deltaVal))}٪</span>`
    : '—';

  return `<div class="card">
    <div class="card-hd">
      <span class="card-type">Today Brief</span>
      <span class="card-time">آخر تحديث: ${timeAgo(d.updatedAt)}</span>
    </div>
    <div class="card-bd">
      <div class="src-tag">
        <div class="src-tag-dot" style="background:${d.xEnabled ? 'var(--blue)' : 'var(--amber)'}"></div>
        ${srcLabel}
      </div>
      <div class="stat-row">
        <div class="stat-chip">
          <span class="stat-l">المقالات</span>
          <span class="stat-v">${toAr(d.totalToday)}</span>
          <span class="stat-s">اليوم</span>
        </div>
        <div class="stat-chip">
          <span class="stat-l">الأسبوع</span>
          <span class="stat-v">${toAr(d.totalWeek)}</span>
        </div>
        <div class="stat-chip">
          <span class="stat-l">vs معدل</span>
          <span class="stat-v" style="font-size:.9rem">${deltaHtml}</span>
        </div>
      </div>
      <div class="dir-pill ${dir.cls}">
        <span class="dir-dot"></span>${dir.ar}
      </div>
      <div class="sec-label">توزيع التغطية</div>
      ${bars}
      <div class="ai-bl">
        <div class="ai-label"><span class="ai-dot"></span>تحليل السلوك التحريري</div>
        <p class="ai-text">${d.summary || '—'}</p>
      </div>
    </div>
  </div>`;
}

// ── RENDER WEEK ───────────────────────────────────────────────
function renderWeek(d) {
  if (d.error) return renderError(d);
  const dir = d.dirMeta || { ar: 'متنوع', cls: 'dir-g' };

  const trendsHtml = (d.trends || []).length
    ? d.trends.map(t => {
        const abs = Math.abs(t.delta);
        const [cls, sign] = t.type === 'spike'
          ? ['tr-sp', '⚡']
          : t.type === 'up'
          ? ['tr-up', '↑']
          : ['tr-dn', '↓'];
        return `<div class="tr-row">
          <span class="tr-topic">${t.nameAr}</span>
          <span class="${cls}">${sign} ${t.delta > 0 ? '+' : ''}${toAr(t.delta)}٪</span>
        </div>`;
      }).join('')
    : `<div class="tr-row"><span class="tr-topic" style="color:var(--text-3)">لا تغييرات ملحوظة هذا الأسبوع</span></div>`;

  return `<div class="card">
    <div class="card-hd">
      <span class="card-type">Weekly Pattern</span>
      <span class="card-time">${toAr(7)} أيام</span>
    </div>
    <div class="card-bd">
      <div class="stat-row">
        <div class="stat-chip">
          <span class="stat-l">المقالات</span>
          <span class="stat-v">${toAr(d.totalWeek)}</span>
        </div>
        <div class="stat-chip">
          <span class="stat-l">المعدل/يوم</span>
          <span class="stat-v">${toAr(Math.round(d.totalWeek / 7))}</span>
        </div>
      </div>
      <div class="dir-pill ${dir.cls}">
        <span class="dir-dot"></span>التوجه: ${dir.ar.split('—')[0].trim()}
      </div>
      <div class="sec-label">التغيرات الأسبوعية</div>
      ${trendsHtml}
      <div class="ai-bl">
        <div class="ai-label"><span class="ai-dot"></span>تحليل الأسبوع</div>
        <p class="ai-text">${d.summary || '—'}</p>
      </div>
    </div>
  </div>`;
}

// ── RENDER STORIES ────────────────────────────────────────────
function renderStories(d) {
  if (d.error) return renderError(d);
  const stories = d.topStories || [];
  if (!stories.length) return `<div class="card"><div class="err-card"><div class="err-icon">📰</div><div class="err-msg">لا توجد قصص</div></div></div>`;

  const items = stories.map((s, i) => {
    const impCls = i === 0 ? 'imp-h' : i <= 2 ? 'imp-m' : 'imp-l';
    const title = s.title.substring(0, 100);
    const desc  = (s.desc || '').substring(0, 90);
    const srcIcon = s.source === 'twitter' ? '<span class="src-x">𝕏</span>' : '📡';
    return `<div class="story" onclick="window.open('${s.link}','_blank')">
      <div class="imp ${impCls}"></div>
      <div>
        <div class="story-hd">${title}</div>
        ${desc ? `<div class="story-sub">${desc}${desc.length >= 90 ? '…' : ''}</div>` : ''}
        <div class="story-src">${srcIcon} ${fmtTime(s.pubDate)}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="card-hd">
      <span class="card-type">Top Stories</span>
      <span class="card-time">${toAr(stories.length)} قصص</span>
    </div>
    <div class="card-bd">${items}</div>
  </div>`;
}

function renderError(d) {
  const isNoToken = d.error === 'no_data';
  return `<div class="card"><div class="err-card">
    <div class="err-icon">📡</div>
    <div class="err-msg">${isNoToken ? 'لا توجد بيانات بعد' : 'تعذّر جلب البيانات'}</div>
    <div class="err-sub">${d.error || ''}</div>
    <button class="retry" onclick="loadChannel('${d.channel?.id || activeId}')">إعادة المحاولة</button>
  </div></div>`;
}

// ── POPULATE CHANNEL VIEW ─────────────────────────────────────
function populateView(id, data) {
  const view = document.getElementById(`chv-${id}`);
  if (!view) return;
  view.querySelector('[data-tab="today"]').innerHTML   = renderToday(data);
  view.querySelector('[data-tab="week"]').innerHTML    = renderWeek(data);
  view.querySelector('[data-tab="stories"]').innerHTML = renderStories(data);

  // Update count badge
  const countEl = document.querySelector(`#rail-${id} .ch-count`);
  if (countEl && data.totalToday != null) countEl.textContent = toAr(data.totalToday);

  // Flash badge
  const badge = document.querySelector(`#rail-${id} .ch-badge`);
  if (badge) { badge.style.display = 'block'; setTimeout(() => badge.style.display = 'none', 6000); }
}

// ── FETCH CHANNEL ─────────────────────────────────────────────
async function loadChannel(id) {
  setStatus('loading');
  try {
    const res  = await fetch(`${API}/api/channel/${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    populateView(id, data);
    setStatus('live');
  } catch (err) {
    console.error('loadChannel', id, err);
    setStatus('error');
    const view = document.getElementById(`chv-${id}`);
    if (view) view.querySelectorAll('.sub-card').forEach(sc => {
      sc.innerHTML = renderError({ error: err.message, channel: { id } });
    });
  }
}

// SSE: subscribe to live updates for a channel
function subscribeChannel(id) {
  if (eventSources[id]) { eventSources[id].close(); }
  const es = new EventSource(`${API}/api/channel/${id}/live`);
  es.onmessage = e => {
    try {
      const data = JSON.parse(e.data);
      populateView(id, data);
      setStatus('live');
    } catch(err) { console.error('SSE parse', err); }
  };
  es.onerror = () => setStatus('error');
  eventSources[id] = es;
}

// ── STATUS PILL ───────────────────────────────────────────────
function setStatus(s) {
  const dot   = document.getElementById('liveDot');
  const label = document.getElementById('liveLabel');
  dot.className = 'live-dot' + (s === 'loading' ? ' loading' : s === 'error' ? ' error' : '');
  label.textContent = s === 'loading' ? 'جارٍ التحميل' : s === 'error' ? 'خطأ في الاتصال' : 'مباشر';
}

// ── BUILD UI ──────────────────────────────────────────────────
function buildUI(channelList) {
  const rail  = document.getElementById('chRail');
  const views = document.getElementById('chViews');

  channelList.forEach((ch, i) => {
    // Rail item
    const item = document.createElement('div');
    item.className = `ch-item${i === 0 ? ' active' : ''}`;
    item.id = `rail-${ch.id}`;
    item.dataset.ch = ch.id;
    item.innerHTML = `
      <div class="ch-av">
        <div class="ch-badge"></div>
        ${ch.label}
      </div>
      <div class="ch-name">${ch.nameAr || ch.label}</div>
      <div class="ch-count"></div>`;
    item.addEventListener('click', () => switchChannel(ch.id));
    rail.appendChild(item);

    // View with skeletons
    const view = document.createElement('div');
    view.className = `ch-view${i === 0 ? ' active' : ''}`;
    view.id = `chv-${ch.id}`;
    view.innerHTML = `
      <div class="sub-card active" data-tab="today">${skelHtml()}</div>
      <div class="sub-card"        data-tab="week">${skelHtml()}</div>
      <div class="sub-card"        data-tab="stories">${skelHtml()}</div>`;
    views.appendChild(view);
  });

  // Add channel button
  const add = document.createElement('div');
  add.className = 'ch-add';
  add.innerHTML = `<div class="ch-add-circle">+</div><div class="ch-name">إضافة</div>`;
  rail.appendChild(add);
}

// ── SWITCH CHANNEL ────────────────────────────────────────────
function switchChannel(id) {
  activeId = id;
  document.querySelectorAll('.ch-item').forEach(el => el.classList.toggle('active', el.dataset.ch === id));
  document.querySelectorAll('.ch-view').forEach(el => el.classList.toggle('active', el.id === `chv-${id}`));
  syncTab(id, activeTab);
  document.getElementById('scroll').scrollTop = 0;
}

function syncTab(chId, tab) {
  const view = document.getElementById(`chv-${chId}`);
  if (!view) return;
  view.querySelectorAll('.sub-card').forEach(sc => sc.classList.toggle('active', sc.dataset.tab === tab));
}

// ── TABS ──────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    syncTab(activeId, activeTab);
  });
});

// ── SWIPE ─────────────────────────────────────────────────────
let tx = 0;
const sc = document.getElementById('scroll');
sc.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
sc.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) < 55) return;
  const ids  = channels.map(c => c.id);
  const cur  = ids.indexOf(activeId);
  const next = dx < 0 ? cur + 1 : cur - 1;
  if (next >= 0 && next < ids.length) switchChannel(ids[next]);
}, {passive:true});

// ── ONBOARDING ────────────────────────────────────────────────
document.querySelectorAll('.freq-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.freq-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('confirmBtn').classList.add('show');
  });
});
document.getElementById('confirmBtn').addEventListener('click', () => {
  document.getElementById('onboarding').classList.add('exit');
});

// ── NAV ───────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(n => {
  n.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    n.classList.add('active');
  });
});

// ── BOOT ──────────────────────────────────────────────────────
async function boot() {
  try {
    const res = await fetch(`${API}/api/channels`);
    if (!res.ok) throw new Error(`Server returned ${res.status}`);
    const json = await res.json();
    channels = json.channels;

    buildUI(channels);
    activeId = channels[0].id;

    // Load all channels concurrently, then subscribe to SSE for the active one
    await Promise.allSettled(channels.map(ch => loadChannel(ch.id)));
    subscribeChannel(activeId);

  } catch (err) {
    console.error('Boot failed:', err);
    setStatus('error');
    document.getElementById('liveLabel').textContent = 'السيرفر غير متاح';
    // Show setup hint
    document.getElementById('chViews').innerHTML = `
      <div class="card" style="margin-top:1rem">
        <div class="card-bd">
          <div style="font-size:1.5rem;text-align:center;margin-bottom:12px">🔌</div>
          <div style="font-size:.9rem;font-weight:600;text-align:center;margin-bottom:8px">السيرفر غير متصل</div>
          <div style="font-size:.78rem;color:var(--text-2);line-height:1.6;text-align:center">
            شغّل السيرفر أولاً:<br>
            <code style="font-family:var(--font-ui);background:rgba(255,255,255,.08);padding:4px 8px;border-radius:6px;font-size:.72rem">npm start</code>
          </div>
        </div>
      </div>`;
  }
}

boot();
</script>
